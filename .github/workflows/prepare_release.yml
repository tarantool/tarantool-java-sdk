name: Prepare Release to Maven Central

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release version (e.g., 2.0.0, 2.0.0-M1, 2.0.0-RC1)'
        required: true
        default: "2.0.0"
      developmentVersion:
        description: 'Version to use for new working copy'
        required: true
        default: '2.0.0-SNAPSHOT'

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Configure Git user
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.releaseVersion }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-M[0-9]+|-RC[0-9]+)?$ ]]; then
            echo "Error: Version '$VERSION' does not match valid pattern"
            echo "Expected formats: X.Y.Z, X.Y.Z-MN, or X.Y.Z-RCN"
            exit 1
          fi
          echo "Version '$VERSION' is valid"

      - name: Run release release.yml
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ github.event.inputs.releaseVersion }}
          DEVELOPMENT_VERSION: ${{ github.event.inputs.developmentVersion }}
        run: |
          ./mvnw release:prepare -DskipTests -Darguments=-DskipTests \
            -DreleaseVersion="$RELEASE_VERSION" -Dtag="$RELEASE_VERSION" \
            -DdevelopmentVersion="$DEVELOPMENT_VERSION"
